<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>OBS Notepad</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;

            background: #1F1F23;
            color: white;

            font-family: Consolas, monospace;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;

            width: 100%;
            min-height: 0;

            border: none;
            outline: none;
            resize: none;

            background: #1F1F23;
            color: white;

            padding: 10px;

            font-size: 14px;
            line-height: 1.4;

            overflow-y: auto;
        }

        textarea::placeholder {
            color: #888;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;

            padding: 4px 8px;

            font-size: 12px;
            color: #A0A0A0;

            border-top: 1px solid #2D2D33;

            user-select: none;
        }

        .char-counter {
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <textarea
        id="notepad"
        placeholder="Type here..."
        spellcheck="false"
    ></textarea>

    <div class="footer">
        <div class="char-counter" id="charCounter">0</div>
    </div>

    <script>

        (function () {

            const STORAGE_KEY = "v1-text";

            const textarea = document.getElementById("notepad");
            const charCounter = document.getElementById("charCounter");

            function updateCharCounter() {
                charCounter.textContent = textarea.value.length;
            }

            function saveText() {
                localStorage.setItem(STORAGE_KEY, textarea.value);
                updateCharCounter();
            }

            function loadText() {
                const savedText = localStorage.getItem(STORAGE_KEY);

                if (savedText !== null) {
                    textarea.value = savedText;
                }

                updateCharCounter();
            }

            textarea.addEventListener("input", saveText);

            loadText();

        })();

    </script>

</body>
</html>
