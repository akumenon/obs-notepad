<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OBS Notepad</title>
    <style>
        body {
            overflow: hidden;
               background-color: #1F1F23;
            color: white;
        }

        textarea {
            top: 0;
            width: 100%;
            height: 100%;
            left: 0;
            border: none;
            background-color: #1F1F23;
            color: white;
            padding: 5px;
        }

        a {
            color: lime;
        }
        
        .char-counter {
            position: absolute;
            right: 5px;
            bottom: 5px;
            color: lightgray;
        }
    </style>
</head>
<body>


<h1>This has been moved to PotatoHotDog and will be deleted soon! - Please visit Discord if you have questions!</h1>
<p><a href="https://www.potatohotdog.com/">https://www.potatohotdog.com/</a></p>

    
<textarea></textarea>
<div class="char-counter"></div>

<script>

    (function () {

        var KEY = "v1-text";
        var charCounter = document.querySelector(".char-counter");
        var textarea = document.querySelector("textarea");

        var updateCharCounter = function() {
             charCounter.innerText = textarea.value.length;
        }
        
        textarea.addEventListener("keyup", function () {
            charCounter.innerText = textarea.value.length;
            window.localStorage.setItem(KEY, textarea.value);
        });
       
        /*
         * Init
         */

        var initText = window.localStorage.getItem(KEY);
        textarea.value = initText;
        updateCharCounter();

    }());

</script>

</body>
</html>
